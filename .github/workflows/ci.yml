name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  PLATFORMS: linux/amd64 linux/arm64

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: vet
        run: go vet ./...

      - name: build
        run: go build -o gh-readonly .

      - name: Unit / proxy tests
        run: go test -v ./...
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Integration - allow GET
        run: |
          ./gh-readonly api /repos/karanokuri/gh-readonly --jq .name | grep -q "gh-readonly"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Integration - deny POST
        run: |
          out=$(./gh-readonly api --method POST /repos/karanokuri/gh-readonly/issues \
            --field title="[BUG] gh-readonly failed to block POST — write protection is broken" 2>&1) && exit 1 || true
          echo "$out" | grep -q "gh-readonly: denied"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Integration - allow GraphQL query
        run: |
          ./gh-readonly api graphql -f query='query { viewer { login } }' \
            --jq '.data.viewer.login' | grep -q .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Integration - deny GraphQL mutation
        run: |
          repo_id=$(gh api /repos/${{ github.repository }} --jq .node_id)
          out=$(./gh-readonly api graphql \
            -f query='mutation($id:ID!,$t:String!){createIssue(input:{repositoryId:$id,title:$t}){issue{id}}}' \
            -f id="$repo_id" \
            -f title="[BUG] gh-readonly failed to block GraphQL mutation — write protection is broken" \
            2>&1) && exit 1 || true
          echo "$out" | grep -q "gh-readonly: denied"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Integration - exit code propagation
        run: |
          exit_code=0
          ./gh-readonly api --method POST /repos/karanokuri/gh-readonly/issues \
            --field title="[BUG] gh-readonly failed to block POST — write protection is broken" 2>/dev/null || exit_code=$?
          test $exit_code -eq 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Release
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Cross-compile
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          for pair in $PLATFORMS; do
            GOOS=${pair%/*} GOARCH=${pair#*/}
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -trimpath \
              -ldflags="-s -w -X main.version=${BUILD_DATE}" \
              -o "gh-readonly_${GOOS}_${GOARCH}" .
          done

      - name: Create/update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          assets=()
          for pair in $PLATFORMS; do
            assets+=("gh-readonly_${pair%/*}_${pair#*/}")
          done
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          gh release create latest --title "latest" --target ${{ github.sha }} \
            "${assets[@]}"
