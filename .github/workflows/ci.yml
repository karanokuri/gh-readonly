name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: vet
        run: go vet ./...

      - name: build
        run: go build -o gh-readonly .

      - name: Unit / proxy tests
        run: go test -v ./...
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Integration - allow GET
        run: |
          ./gh-readonly api /repos/karanokuri/gh-readonly --jq .name | grep -q "gh-readonly"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Integration - deny POST
        run: |
          out=$(./gh-readonly api --method POST /repos/karanokuri/gh-readonly/issues \
            --field title="[BUG] gh-readonly failed to block POST — write protection is broken" 2>&1) && exit 1 || true
          echo "$out" | grep -q "gh-readonly: denied"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Integration - exit code propagation
        run: |
          exit_code=0
          ./gh-readonly api --method POST /repos/karanokuri/gh-readonly/issues \
            --field title="[BUG] gh-readonly failed to block POST — write protection is broken" 2>/dev/null || exit_code=$?
          test $exit_code -eq 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          go build -trimpath -ldflags="-s -w -X main.version=${BUILD_DATE}" \
            -o gh-readonly_${{ matrix.goos }}_${{ matrix.goarch }} .

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: gh-readonly_${{ matrix.goos }}_${{ matrix.goarch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: gh-readonly_${{ matrix.goos }}_${{ matrix.goarch }}
          path: gh-readonly_${{ matrix.goos }}_${{ matrix.goarch }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          pattern: gh-readonly_*
          merge-multiple: true

      - name: Create/update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          gh release create latest --title "latest" --target ${{ github.sha }} \
            gh-readonly_linux_amd64 gh-readonly_linux_arm64
